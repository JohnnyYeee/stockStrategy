name: refresh-pullback-screen

# Auto-runs the screener and commits data.json back to the repo.
# Times are UTC. US market open 9:30 ET / close 16:00 ET.
#   EDT (Mar-Nov, UTC-4):  open 13:30  close 20:00
#   EST (Nov-Mar, UTC-5):  open 14:30  close 21:00
# We schedule both open+close for BOTH DST states (4 runs) so it works year-round.
# Note: GitHub cron can be delayed 5-15 min and is best-effort, so we run a little
# after open and well after close (so the daily bar is final).

on:
  schedule:
    - cron: "45 13 * * 1-5"   # ~09:45 ET open  (EDT)
    - cron: "30 20 * * 1-5"   # ~16:30 ET close (EDT)
    - cron: "45 14 * * 1-5"   # ~09:45 ET open  (EST)
    - cron: "30 21 * * 1-5"   # ~16:30 ET close (EST)
  workflow_dispatch:           # lets you trigger it manually from the Actions tab

permissions:
  contents: write              # needed to commit data.json back

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install yfinance pandas numpy requests lxml

      - name: Run screener
        run: python screener.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No change"
          else
            git commit -m "data: refresh screen $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
