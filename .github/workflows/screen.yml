name: refresh-pullback-screen

# Auto-runs the screener and commits data.json back to the repo.
# One run per weekday, ~1.5h after the US close, so the daily bar is FINAL.
# US market closes 16:00 ET. Time below is UTC; GitHub cron is DST-unaware, but the
# 1.5h cushion keeps this single UTC time safely AFTER the close in both DST states:
#   EDT (Mar-Nov, UTC-4):  21:30 UTC = 17:30 ET  (+1.5h after close)
#   EST (Nov-Mar, UTC-5):  21:30 UTC = 16:30 ET  (+0.5h after close)
# No seasonal change needed.

on:
  schedule:
    - cron: "30 21 * * 1-5"    # ~17:30 ET (EDT) / ~16:30 ET (EST), Mon-Fri, after close
  workflow_dispatch:           # lets you trigger it manually from the Actions tab

permissions:
  contents: write              # needed to commit data.json back

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install yfinance pandas numpy requests lxml

      - name: Run screener
        run: python screener.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No change"
          else
            git commit -m "data: refresh screen $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
