name: refresh-pullback-screen

# Auto-runs the screener and commits data.json back to the repo.
# Two runs per weekday (times are UTC; US market closes 16:00 ET):
#   1) ~30 min BEFORE close -> PREVIEW on that day's near-final (still-forming) daily bar,
#      so you can act into the close.
#   2) ~1.5h AFTER close    -> the FINAL, settled daily bar.
# GitHub cron is DST-unaware & best-effort. The after-close run has a 1.5h cushion so a
# single UTC time stays after the close year-round. The pre-close run is timed for EDT
# (summer); in EST (Nov-Mar) it drifts ~1h earlier -> change "30 19" to "30 20" in Nov.
#   pre-close  : 19:30 UTC = 15:30 ET (EDT, -30m) / 14:30 ET (EST, -90m)
#   after-close: 21:30 UTC = 17:30 ET (EDT, +1.5h) / 16:30 ET (EST, +0.5h)

on:
  schedule:
    - cron: "30 19 * * 1-5"    # ~15:30 ET (EDT), ~30 min before close — PREVIEW (near-final bar)
    - cron: "30 21 * * 1-5"    # ~17:30 ET (EDT) / ~16:30 ET (EST), after close — FINAL bar
  workflow_dispatch:           # lets you trigger it manually from the Actions tab

permissions:
  contents: write              # needed to commit data.json back

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install yfinance pandas numpy requests lxml

      - name: Run screener
        run: python screener.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No change"
          else
            git commit -m "data: refresh screen $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
